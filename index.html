<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Jhon Doe" />
    <title>Menú accesibiliad web</title>
    <link rel="stylesheet" href="/assets/css/accessibility.css">
</head>
<body>
    <!-- MENU Accesibilidad -->
	<div class="menu-accesibilidad">
		<!-- BTN FLOTANTE -->
		<button 
			id="a11y-toggle"
			class="btn-flotante-accesibilidad"
			aria-expanded="false"
			aria-controls="a11y-panel"
			aria-label="Abrir menú de accesibilidad">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><path d="m9 20 3-6 3 6"/><path d="m6 8 6 2 6-2"/><path d="M12 10v4"/></svg>
		</button>
		<!-- FIN BTN FLOTANTE -->
		<!-- PANEL -->
		<section 
			id="a11y-panel"
			class="a11y-panel"
			role="region"
			aria-labelledby="a11y-title"
			hidden >

			<header class="a11y-header">
				<h2 id="a11y-title">Opciones de Accesibilidad</h2>

				<button 
					class="a11y-close"
					aria-label="Cerrar menú de accesibilidad">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-x-icon lucide-circle-x"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
					Cerrar menú
				</button>

				<div class="a11y-reset-wrapper">
					<button type="button" data-a11y="reset" class="a11y-reset">
					<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-ccw-icon lucide-rotate-ccw"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
					Restablecer configuración
					</button>
				</div>

			</header>

			<form class="a11y-options">
				<!-- VISUAL -->
				<fieldset>
					<legend>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
						Visual
					</legend>

					<!-- tamaño texto -->
					<div class="a11y-control">
						<button 
							type="button"
							class="a11y-font-btn"
							data-a11y="fontDec"
							aria-label="Reducir tamaño de texto">
							A-
						</button>

						<button 
							type="button"
							class="a11y-font-btn"
							data-a11y="fontInc"
							aria-label="Aumentar tamaño de texto">
							A+
						</button>
					</div>
					<!-- FIN tamaño texto -->

					<button type="button" data-a11y="grayscale" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-contrast-icon lucide-contrast"><circle cx="12" cy="12" r="10"/><path d="M12 18a6 6 0 0 0 0-12v12z"/></svg>
						Escala de grises
					</button>

					<button type="button" data-a11y="contrast" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sun-icon lucide-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
						Alto contraste
					</button>

					<button type="button" data-a11y="highlightLinks" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil-line-icon lucide-pencil-line"><path d="M13 21h8"/><path d="m15 5 4 4"/><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
						Resaltar enlaces
					</button>

					<button type="button" data-a11y="cursorSize" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mouse-pointer-click-icon lucide-mouse-pointer-click"><path d="M14 4.1 12 6"/><path d="m5.1 8-2.9-.8"/><path d="m6 12-1.9 2"/><path d="M7.2 2.2 8 5.1"/><path d="M9.037 9.69a.498.498 0 0 1 .653-.653l11 4.5a.5.5 0 0 1-.074.949l-4.349 1.041a1 1 0 0 0-.74.739l-1.04 4.35a.5.5 0 0 1-.95.074z"/></svg>
						Cursor grande
					</button>

				</fieldset>
				<!-- FIN VISUAL -->
				<!-- LECTURA -->
				<fieldset>
					<legend>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-glasses-icon lucide-glasses"><circle cx="6" cy="15" r="4"/><circle cx="18" cy="15" r="4"/><path d="M14 15a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M2.5 13 5 7c.7-1.3 1.4-2 3-2"/><path d="M21.5 13 19 7c-.7-1.3-1.5-2-3-2"/></svg>
						Lectura
					</legend>

					<button type="button" data-a11y="readingMask" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rows3-icon lucide-rows-3"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M21 9H3"/><path d="M21 15H3"/></svg>
						Máscara de lectura
					</button>

					<button type="button" data-a11y="readingGuide" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-minus-icon lucide-square-minus"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M8 12h8"/></svg>
						Guía de lectura
					</button>

					<button type="button" data-a11y="dyslexiaFont" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-type-icon lucide-type"><path d="M12 4v16"/><path d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2"/><path d="M9 20h6"/></svg>
						Tipografía para dislexia
					</button>

				</fieldset>
				<!-- FIN LECTURA -->
				<!-- ESPACIADO -->
				<fieldset>
					<legend>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-ruler-dimension-line-icon lucide-ruler-dimension-line"><path d="M10 15v-3"/><path d="M14 15v-3"/><path d="M18 15v-3"/><path d="M2 8V4"/><path d="M22 6H2"/><path d="M22 8V4"/><path d="M6 15v-3"/><rect x="2" y="12" width="20" height="8" rx="2"/></svg>
						Espaciado
					</legend>

					<!-- Vertical -->
					<div class="a11y-spacing-group">

						<button type="button" data-a11y="verticalSpacing">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-move-vertical-icon lucide-move-vertical"><path d="M12 2v20"/><path d="m8 18 4 4 4-4"/><path d="m8 6 4-4 4 4"/></svg>
						Espaciado vertical
						</button>

						<div class="a11y-spacing-levels">

							<button type="button"
								data-a11y-level="verticalSpacing"
								data-level="1"
								aria-label="Nivel 1">
								1
							</button>

							<button type="button"
								data-a11y-level="verticalSpacing"
								data-level="2"
								aria-label="Nivel 2">
								2
							</button>

							<button type="button"
								data-a11y-level="verticalSpacing"
								data-level="3"
								aria-label="Nivel 3">
								3
							</button>

						</div>

					</div>
					<!--FIN Vertical -->
					<!-- Horizontal -->
					<div class="a11y-spacing-group">

						<button type="button" data-a11y="horizontalSpacing">
							<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-move-horizontal-icon lucide-move-horizontal"><path d="m18 8 4 4-4 4"/><path d="M2 12h20"/><path d="m6 8-4 4 4 4"/></svg>
							Espaciado horizontal
						</button>

						<div class="a11y-spacing-levels">

							<button
							type="button"
							data-a11y-level="horizontalSpacing"
							data-level="1"
							aria-label="Nivel 1">
							1
							</button>

							<button
							type="button"
							data-a11y-level="horizontalSpacing"
							data-level="2"
							aria-label="Nivel 2">
							2
							</button>

							<button
							type="button"
							data-a11y-level="horizontalSpacing"
							data-level="3"
							aria-label="Nivel 3">
							3
							</button>

						</div>

					</div>
					<!-- FIN Horizontal -->

				</fieldset>
				<!-- FIN ESPACIADO -->
				<!-- ASISTENCIA -->
				<fieldset>
					<legend>
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info-icon lucide-info"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
						Asistencia
					</legend>

					<button type="button" data-a11y="screenReader" aria-pressed="false">
						<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-speech-icon lucide-speech"><path d="M8.8 20v-4.1l1.9.2a2.3 2.3 0 0 0 2.164-2.1V8.3A5.37 5.37 0 0 0 2 8.25c0 2.8.656 3.054 1 4.55a5.77 5.77 0 0 1 .029 2.758L2 20"/><path d="M19.8 17.8a7.5 7.5 0 0 0 .003-10.603"/><path d="M17 15a3.5 3.5 0 0 0-.025-4.975"/></svg>
						Asistente de lectura
					</button>
				</fieldset>
				<!-- FIN ASISTENCIA -->
			</form>

		</section>
		<!-- FIN PANEL -->
	</div>
	<!-- FIN MENU Accesibilidad -->
     <script type="module" src="/assets/js/accessibility/index.js"></script>
</body>
</html>
